# ============================================================
# ARQUIVO DE EXEMPLO — copie e renomeie para:
#   application-dev.properties   → desenvolvimento
#   application-prod.properties  → produção
# NUNCA commite arquivos com credenciais reais!
# ============================================================

# ---- Snowflake ----
snowflake.url=jdbc:snowflake://<account>.snowflakecomputing.com
snowflake.username=SEU_USUARIO
snowflake.password=SUA_SENHA
snowflake.database=SEU_BANCO
snowflake.schema=SEU_SCHEMA
snowflake.warehouse=SEU_WAREHOUSE
snowflake.role=SEU_ROLE

# ---- Kafka ----
# localhost funciona pois o Kafka no WSL2 está exposto na porta 9092
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ---- Scheduler ----
# Intervalo em milissegundos (10000 = 10 segundos)
pipeline.scheduler.interval=10000

# ---- Tópicos Kafka — um por tabela ----
pipeline.topics.tabela1=topic-tabela1
pipeline.topics.tabela2=topic-tabela2
pipeline.topics.tabela3=topic-tabela3

# ---- Nomes reais das tabelas no Snowflake ----
pipeline.tables.tabela1=NOME_DA_TABELA_1
pipeline.tables.tabela2=NOME_DA_TABELA_2
pipeline.tables.tabela3=NOME_DA_TABELA_3